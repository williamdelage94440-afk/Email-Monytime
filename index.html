function useStorage(key,def){
  const[val,setVal]=useState(()=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}});
  const set=v=>{setVal(v);try{localStorage.setItem(key,JSON.stringify(v));}catch{}};
  return[val,set];
}

const wc=txt=>txt?txt.trim().split(/\s+/).filter(Boolean).length:0;
const hasCTA=txt=>/call|appel|15 min|dispo|réponse|minute|rendez|meet|zoom|agenda/i.test(txt);
const hasPerso=txt=>/\b(vous|votre|vos)\b/i.test(txt);
const extractSubject=e=>e?.split("\n")[0]||"";
const extractBody=e=>e?.split("\n").slice(1).join("\n").trim()||"";
const extractFirstLine=body=>body?.split("\n").find(l=>l.trim())||"";

const G={
  fi:{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid #e2e2e2",fontSize:13,color:"#111",background:"#f8f8f8",outline:"none",boxSizing:"border-box",fontFamily:"system-ui"},
  si:{width:"100%",padding:"7px 9px",borderRadius:8,border:"0.5px solid #e2e2e2",fontSize:11,color:"#111",background:"#f8f8f8",outline:"none",boxSizing:"border-box",fontFamily:"system-ui"},
  sb:{padding:"7px 12px",background:"#6366f1",color:"white",border:"none",borderRadius:8,fontSize:11,fontWeight:500,cursor:"pointer"},
  pill:{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#f0f0f0",color:"#666",border:"0.5px solid #e2e2e2"},
  sp:{width:14,height:14,border:"2px solid rgba(255,255,255,0.3)",borderTopColor:"white",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block",verticalAlign:"middle",marginRight:6},
  spd:{width:13,height:13,border:"2px solid rgba(99,102,241,0.2)",borderTopColor:"#6366f1",borderRadius:"50%",animation:"spin 0.8s linear infinite",display:"inline-block",verticalAlign:"middle",marginRight:4},
  ta:{width:"100%",padding:"8px 10px",borderRadius:8,border:"0.5px solid #e2e2e2",fontSize:11,color:"#111",background:"#f8f8f8",lineHeight:1.7,resize:"vertical",fontFamily:"system-ui",outline:"none",boxSizing:"border-box"},

  sec:{fontSize:11,fontWeight:500,color:"#999",textTransform:"uppercase",letterSpacing:"0.5px",paddingBottom:6,borderBottom:"0.5px solid #e2e2e2",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"},

const aBtn=(primary,small,color)=>({
  fontSize:small?10:11,padding:small?"3px 8px":"6px 12px",

function Inp({label,sub,placeholder,value,onChange}){
  return(
    <div>
      <div style={G.fl}>{label}{sub&&<span style={{fontSize:10,color:"#999",fontWeight:400}}> {sub}</span>}</div>
      <input style={G.fi} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)}/>
    </div>
  );
}

function InfoPanel({title,value,show,onToggle,onChange}){
  if(!show)return null;
  return(
    <div style={{background:"#fff",border:"0.5px solid #6366f1",borderRadius:8,padding:10,marginTop:6}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:11,fontWeight:500,color:"#6366f1"}}>{title}</span>
        <button style={{fontSize:11,color:"#999",cursor:"pointer",padding:"2px 6px",borderRadius:4,border:"0.5px solid #e2e2e2",background:"none"}} onClick={onToggle}>Fermer</button>
      </div>
      <textarea style={G.ta} value={value} onChange={e=>onChange(e.target.value)}/>
      <div style={{fontSize:10,color:"#999",marginTop:4}}>Modifie si besoin.</div>
    </div>
  );
}

function HighlightedEmail({text}){
  if(!text)return null;
  const found=WEAK_PHRASES.filter(({phrase})=>text.toLowerCase().includes(phrase)).map(p=>p.phrase);
  if(!found.length)return <div style={{fontSize:13,color:"#111",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{text}</div>;
  const parts=[];let remaining=text,key=0;
  while(remaining.length>0){
    let earliest=-1,earliestPhrase=null;
    found.forEach(p=>{const idx=remaining.toLowerCase().indexOf(p);if(idx!==-1&&(earliest===-1||idx<earliest)){earliest=idx;earliestPhrase=p;}});
    if(earliest===-1){parts.push(<span key={key++}>{remaining}</span>);break;}
    if(earliest>0)parts.push(<span key={key++}>{remaining.slice(0,earliest)}</span>);
    parts.push(<mark key={key++} style={{background:"#fef08a",borderRadius:3,padding:"0 2px"}}>{remaining.slice(earliest,earliest+earliestPhrase.length)}</mark>);
    remaining=remaining.slice(earliest+earliestPhrase.length);
  }
  return <div style={{fontSize:13,color:"#111",lineHeight:1.75}}>{parts}</div>;
}

function App(){

  const[analysisLoading,setAnalysisLoading]=useState(false);
  const[rewrittenPassages,setRewrittenPassages]=useState({});

  const[rewriteFullLoading,setRewriteFullLoading]=useState(false);

  const[anglesSuggestions,setAnglesSuggestions]=useState([]);
  const[anglesLoading,setAnglesLoading]=useState(false);
  const[selectedAngle,setSelectedAngle]=useState(null);
  const[angleRewriteResult,setAngleRewriteResult]=useState("");
  const[angleRewriteLoading,setAngleRewriteLoading]=useState(false);
  const[altSubjects,setAltSubjects]=useState([]);
  const[altSubjectsLoading,setAltSubjectsLoading]=useState(false);

  const[firstLinesLoading,setFirstLinesLoading]=useState(false);

  const[histSearch,setHistSearch]=useState("");
  const[showDash,setShowDash]=useState(false);
  const[batchMode,setBatchMode]=useState(false);
  const[batchBrands,setBatchBrands]=useState("");
  const[batchResults,setBatchResults]=useState([]);
  const[batchLoading,setBatchLoading]=useState(false);
  const resultRef=useRef(null);

  const resetImprove=()=>{setAnalysis(null);setRewrittenPassages({});setRewrittenFull("");setShortenResult("");setToneResult("");setAnglesSuggestions([]);setSelectedAngle(null);setAngleRewriteResult("");setAltSubjects([]);setAltFirstLines([]);setAltCTAs([]);setPersoScore(null);setReadability(null);setShowWeakPhrases(false);};
  const resetForm=()=>{setBrandName("");setBrandSector("");setBrandUrl("");setBrandContact("");setBrandNotes("");setBrandAnalysis("");setShowBrandInfo(false);setCreatorName("");setCreatorNiche("");setCreatorSubs("");setCreatorViews("");setCreatorEng("");setCreatorAudience("");setCreatorUrlRaw("");setCreatorAnalysis("");setShowCreatorInfo(false);setObjectif("");setAngle("");setWhyNow("");setPreuve("");setSequence("premier_contact");setCustomSequences([]);setTone("direct");setCustomTone("");setResult(null);setResult2(null);setScoring(null);setImproveEmail("");resetImprove();};

  const loadCreator=cr=>{setCreatorName(cr.name||"");setCreatorNiche(cr.niche||"");setCreatorSubs(cr.subs||"");setCreatorViews(cr.views||"");setCreatorEng(cr.eng||"");setCreatorAudience(cr.audience||"");setCreatorUrlRaw(cr.url||"");const parts=[cr.niche&&`Niche : ${cr.niche}`,cr.subs&&`Abonnés : ${cr.subs}`,cr.views&&`Vues : ${cr.views}`,cr.eng&&`Engagement : ${cr.eng}`,cr.audience&&`Audience : ${cr.audience}`].filter(Boolean);if(parts.length)setCreatorAnalysis(parts.join("\n"));};

  const callClaude=async(prompt,maxTokens=1000)=>{

    const data=await res.json();
    return(data.content||[]).map(b=>b.text||"").join("").trim();
  };

  const analyzeUrl=async type=>{
    const url=type==="brand"?brandUrl:creatorUrlRaw;
    if(!url||!apiKey)return;
    setIsAnalyzing(p=>({...p,[type]:true}));

      const prompt=type==="brand"?`Analyse ce site de marque : ${url}\n\nExtrait en 5-6 lignes :\n- Positionnement\n- Cible principale\n- Ton de communication\n- Offre principale\n- Valeurs clés\n\nFormat : "Clé : valeur" par ligne. Factuel et concis.`:`Analyse cette chaîne YouTube : ${url}\n\nExtrait en 5-6 lignes :\n- Niche\n- Audience cible\n- Style de contenu\n- Stats estimées\n- Points forts sponsor\n\nFormat : "Clé : valeur" par ligne. Factuel et concis.`;

      if(type==="brand"){setBrandAnalysis(text);setShowBrandInfo(true);}else{setCreatorAnalysis(text);setShowCreatorInfo(true);}
    }catch{if(type==="brand")setBrandAnalysis("Erreur.");else setCreatorAnalysis("Erreur.");}
    setIsAnalyzing(p=>({...p,[type]:false}));
  };

  const getSeqLabel=()=>{if(sequence==="premier_contact")return"1er contact froid";return customSequences.find(s=>s.id===sequence)?.text||sequence;};
  const getToneLabel=()=>tone==="custom"?(customTone||"personnalisé"):TONES.find(t=>t.value===tone)?.label||tone;
  const buildCtxStr=()=>[brandName&&`MARQUE : ${brandName}${brandSector?` (${brandSector})`:""}`,brandContact&&`Contact : ${brandContact}`,brandNotes&&`Notes : ${brandNotes}`,brandAnalysis&&`Analyse marque : ${brandAnalysis}`,creatorName&&`CRÉATEUR : ${creatorName}${creatorNiche?` — ${creatorNiche}`:""}`,creatorSubs&&`Abonnés : ${creatorSubs}`,creatorViews&&`Vues : ${creatorViews}`,creatorEng&&`Engagement : ${creatorEng}`,creatorAudience&&`Audience : ${creatorAudience}`,creatorAnalysis&&`Analyse créateur : ${creatorAnalysis}`,angle&&`Angle : ${angle}`,whyNow&&`Why now : ${whyNow}`,preuve&&`Preuve : ${preuve}`].filter(Boolean).join("\n");
  const ctx=()=>useFormData?`\nContexte :\n${buildCtxStr()}`:"";

  const buildEmailPrompt=(contextEmail=null,lang="fr")=>`Tu es un expert en prospection B2B pour Monytime, agence française de placement produit sur YouTube.
Génère un email de prospection en ${lang==="en"?"anglais":"français"}.
${buildCtxStr()}
CONTEXTE :
- Objectif : ${objectif||"Proposition de collaboration sponsoring"}
- Étape : ${getSeqLabel()}
- Ton : ${getToneLabel()}${tone==="custom"&&customTone?`\nStyle exact : "${customTone}"`:""}
${contextEmail?`\nEMAIL PRÉCÉDENT :\n${contextEmail}`:""}
RÈGLES :
- Max 120 mots corps
- ${sequence==="premier_contact"?"1ère ligne = pattern interrupt fort, jamais \"je me permets de...\"":"Adapte à l'étape : "+getSeqLabel()}
- Orienté bénéfice marque, CTA simple

FORMAT : "Objet : ..." puis corps. Rien d'autre.`;

  const saveEntry=(email,extra={})=>{const entry={id:Date.now(),brand:brandName,contact:brandContact,creator:creatorName||creatorUrlRaw||"–",sequence:getSeqLabel(),tone:getToneLabel(),email,brandAnalysis,creatorAnalysis,statut:"Contacté",time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),date:new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}),...extra};setHistory(prev=>[entry,...prev]);return entry;};

  const generate=async(contextEmail=null,lang="fr",silent=false)=>{

                              <input style={{...G.fi,flex:1,fontSize:11,padding:"7px 10px"}} placeholder="ex : Suite à notre appel…" value={newSeqText} onChange={e=>setNewSeqText(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter"&&newSeqText.trim()){const id=Date.now().toString();setCustomSequences(p=>[...p,{id,text:newSeqText.trim()}]);setSequence(id);setNewSeqText("");setAddingSeq(false);}if(e.key==="Escape"){setAddingSeq(false);setNewSeqText("");}}}/>
                              <button style={{...G.sb,padding:"7px 10px",fontSize:11}} onClick={()=>{if(newSeqText.trim()){const id=Date.now().toString();setCustomSequences(p=>[...p,{id,text:newSeqText.trim()}]);setSequence(id);setNewSeqText("");setAddingSeq(false);}}}>OK</button>
                              <button style={{...G.sb,background:"#eee",color:"#666",padding:"7px 10px",fontSize:11}} onClick={()=>{setAddingSeq(false);setNewSeqText("");}}>✕</button>
                            </div>
                          ):<div style={{padding:"8px 12px",borderRadius:8,border:"0.5px dashed #ccc",cursor:"pointer",color:"#999",fontSize:11}} onClick={()=>setAddingSeq(true)}>+ Ajouter</div>}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div>
                    <div style={G.sec}>Ton rédactionnel</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
                      {TONES.map(t=><div key={t.value} style={{padding:"8px 4px",borderRadius:8,border:`0.5px solid ${tone===t.value?"#6366f1":"#e2e2e2"}`,textAlign:"center",cursor:"pointer",background:tone===t.value?"#eef2ff":"#f8f8f8"}} onClick={()=>setTone(t.value)}><div style={{fontSize:10,fontWeight:500,color:tone===t.value?"#6366f1":"#111"}}>{t.label}</div><div style={{fontSize:9,color:"#999",marginTop:1}}>{t.desc}</div></div>)}
                    </div>
                    {tone==="custom"&&<div style={{marginTop:8}}><div style={G.fl}>Décris ton style</div><input style={G.fi} placeholder='ex : décontracté mais pro, comme si je parlais à un pote dans le business' value={customTone} onChange={e=>setCustomTone(e.target.value)}/></div>}
                  </div>

                  <div style={{display:"flex",gap:8}}>
                    <button style={{flex:1,padding:11,background:canGenerate?"#6366f1":"#ccc",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:canGenerate?"pointer":"not-allowed"}} onClick={()=>generate()} disabled={!canGenerate}>{isLoading?<><div style={G.sp}/>Génération…</>:"Générer l'email"}</button>
                    <button style={{padding:"0 14px",background:canGenerate?"#4f46e5":"#ccc",color:"white",border:"none",borderRadius:8,fontSize:12,fontWeight:500,cursor:canGenerate?"pointer":"not-allowed"}} onClick={generateAB} disabled={!canGenerate}>{isAbLoading?<div style={G.sp}/>:"A/B"}</button>
                  </div>

                  {result&&(
                    <>
                      <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:1,background:"#e2e2e2"}}/><div style={{fontSize:11,fontWeight:500,color:"#999",textTransform:"uppercase",letterSpacing:"0.5px"}}>{result2?"Résultat A/B":"Résultat"}</div><div style={{flex:1,height:1,background:"#e2e2e2"}}/></div>
                      <div style={{display:"flex",gap:12,flexDirection:result2?"row":"column"}}>
                        {[result,result2].filter(Boolean).map((r,idx)=><ResultBlock key={idx} r={r} idx={idx}/>)}
                      </div>
                    </>
                  )}
                </>
              )}
            </>
          )}
          <div style={{height:20}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
